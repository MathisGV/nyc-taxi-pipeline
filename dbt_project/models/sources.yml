version: 2

sources:
  - name: raw
    database: nyc_taxi
    schema: public
    tables:
      - name: fact_taxi_trips
        description: "Données des trajets Yellow Taxi NYC transformées par Spark"
        columns:
          - name: pickup_datetime
            description: "Heure de prise en charge"
          - name: trip_duration_minutes
            description: "Durée du trajet en minutes"
          - name: tip_percentage
            description: "Pourcentage de pourboire"
          - name: total_amount
            description: "Montant total du trajet"
          - name: passenger_count
            description: "Nombre de passagers"

      - name: dim_weather
        description: "Relevés météo horaires NYC via OpenWeatherMap"
        columns:
          - name: weather_timestamp
            description: "Horodatage du relevé météo"
          - name: weather_category
            description: "Catégorie météo"
          - name: temperature
            description: "Température en °C"
          - name: humidity
            description: "Humidité"
          - name: wind_speed
            description: "Vitesse du vent"